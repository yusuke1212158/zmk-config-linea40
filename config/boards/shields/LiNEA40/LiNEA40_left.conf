#include "LiNEA40.dtsi"
#include <input/processors.dtsi>
#include <input/processors/runtime-input-processor.dtsi>
#include <behaviors/battery_history_request.dtsi>

# ===============================
# Board / SoC
# ===============================
CONFIG_NRF52_SERIES=y
CONFIG_SOC_NRF52840=y

# NFC pins as GPIO (XIAO BLE)
CONFIG_NFCT_PINS_AS_GPIOS=y

# ===============================
# ZMK Core
# ===============================
CONFIG_ZMK=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_CENTRAL=y

# ===============================
# Input / Pointing
# ===============================

# Trackball / mouse support
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_SCROLL=y

# Input listener (必須)
CONFIG_ZMK_INPUT_LISTENER=y

# Runtime input processors (必須)
CONFIG_ZMK_RUNTIME_INPUT_PROCESSORS=y

# ===============================
# Encoder (EC11)
# ===============================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ===============================
# Audio / Volume
# ===============================
CONFIG_ZMK_VOLUME=y

# ===============================
# Power / Battery
# ===============================
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_HISTORY=y

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ===============================
# Settings / DYA Studio
# ===============================
CONFIG_ZMK_SETTINGS=y
CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000
CONFIG_ZMK_SPLIT_RELAY_EVENT=y

# ===============================
# RGB Battery Widget (optional)
# ===============================
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10