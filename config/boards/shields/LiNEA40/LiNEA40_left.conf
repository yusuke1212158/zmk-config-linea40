# ===============================
# Encoder (EC11)
# ===============================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ===============================
# Pointing / Mouse
# ===============================
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_SCROLL=y

# ===============================
# Input listener
# ===============================
CONFIG_ZMK_INPUT_LISTENER=y

# ===============================
# Battery reporting
# ===============================
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_HISTORY=y

# ===============================
# Disable deprecated symbols (超重要)
# ===============================
CONFIG_NFCT_PINS_AS_GPIOS=n
CONFIG_NRF_STORE_REBOOT_TYPE_GPREGRET=n